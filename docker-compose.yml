services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    # Ollama is only reachable from other Compose services (e.g. api), not the public internet.
    expose:
      - "11434"
    # Optional: GPU (NVIDIA Container Toolkit on the host). Uncomment on a GPU VM.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      # Overrides host/.env so the API always targets the Ollama service on the Compose network.
      LLM_URL: http://ollama:11434/api/generate
    depends_on:
      ollama:
        condition: service_started

volumes:
  ollama_data:
  hf_cache:
